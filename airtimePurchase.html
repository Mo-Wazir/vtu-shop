<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Airtime Purchase</title>
</head>
<body>

    <header>
        <ul>
            <li> <a href="/">Go hard or Go Home</a> </li>
            <li> <a href="airtimePurchase.html">Buy Airtime</a> </li>
        </ul>
        </header>
    
  <main>
    <p>Select Airtime to purchase</p>

    <label for="network">Network</label>
    <input type="number" name="network" id="network"> <br>

    <label for="phone">Phone Number</label>
    <input type="number" name="phone" id="phone"> <br>

    <label for="amount">Amount</label>
    <input type="number" name="amount" id="amount" min="50"> <br>
    
    <button type="submit"> Confirm to Purchase</button> <br>

  </main>

</body>
